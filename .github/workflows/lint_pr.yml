name: lint_pr
on: pull_request
jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install clang-format 14
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14
      - name: Run clang-format check (changed C/H files only)
        run: |
          shopt -s globstar nullglob

          # Compare against the PR base commit and only lint changed
          # C/H files under src/ and include/.
          base_sha="${{ github.event.pull_request.base.sha }}"
          files=()
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              src/*.c|src/*.h|src/**/*.c|src/**/*.h|include/*.c|include/*.h|include/**/*.c|include/**/*.h)
                files+=("$path")
                ;;
            esac
          done < <(git diff --name-only "${base_sha}...HEAD")

          if [ ${#files[@]} -eq 0 ]; then
            echo "No changed C/H files under src/ or include/."
            exit 0
          fi

          clang-format-14 --dry-run -Werror "${files[@]}"
        shell: bash
