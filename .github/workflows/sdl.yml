name: SDL port build

on:
  push:
    branches: [main, master]
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'src/platform/**'
      - 'include/platform/**'
      - '.github/workflows/sdl.yml'
  pull_request:
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'src/platform/**'
      - 'include/platform/**'
      - '.github/workflows/sdl.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ubuntu-latest (${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [USA]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev ninja-build

      - name: Configure
        run: |
          cmake -S . -B build -DTMC_GAME_VERSION=${{ matrix.version }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Smoke test (headless, 30 frames)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          ./build/tmc_sdl --frames=30 --mute --save-dir=.

      # PR #2b.4a of the SDL-port roadmap: the `tmc_game_sources` static
      # library is now always built as a dependency of `tmc_sdl` (regardless
      # of `TMC_LINK_GAME_SOURCES`), so the previous second `=ON` configure/
      # build pass is no longer necessary -- the leaf set is compile-checked
      # by the default build above. Verify the artifact exists so a future
      # CMake refactor can't silently drop the dependency.
      - name: Verify tmc_game_sources library was built
        run: |
          test -f build/libtmc_game_sources.a
