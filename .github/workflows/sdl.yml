name: SDL port build

on:
  push:
    branches: [main, master]
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'src/platform/**'
      - 'include/platform/**'
      - 'tools/port/**'
      - 'data/gfx/**'
      - 'assets/gfx.json'
      - '.github/workflows/sdl.yml'
  pull_request:
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'src/platform/**'
      - 'include/platform/**'
      - 'tools/port/**'
      - 'data/gfx/**'
      - 'assets/gfx.json'
      - '.github/workflows/sdl.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ubuntu-latest (${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [USA]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev ninja-build

      - name: Configure
        run: |
          cmake -S . -B build -DTMC_GAME_VERSION=${{ matrix.version }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      # Scripted-input smoke test: drive synthetic START presses through
      # the actual title-screen state machine so CI exercises the full
      # boot → "PRESS START" → file-select handoff path on every run.
      #
      # Title-screen timing (USA build, observed via the per-frame state
      # trace; see HandleTitlescreen in src/title.c):
      #   f≈321  HandleTitlescreen reaches gIntroState.state=1 sub=3
      #          (the "PRESS START" idle that polls for input)
      #   f=350  scripted START fires → AdvanceIntroSequence transitions
      #          gIntroState.state 1→2 with an internal timer=60 frames
      #   f≈411  the 60-frame countdown completes → state 2→3 (now
      #          polling again for the second advance press)
      #   f=500  scripted START fires → AdvanceIntroSequence sets
      #          gMain.state=GAMETASK_MAIN and queues a fade-out
      #   f≈534  fade completes → SetTask(TASK_FILE_SELECT)
      #
      # The frame budget below (700) deliberately runs past that final
      # task switch so CI verifies the START presses really do progress
      # past the title screen, not just that they reach
      # REG_KEYINPUT. The two earlier `--press=` entries (`START@60+5`
      # and the lone `A@180+5`) are no-ops at those frame numbers
      # (the press-start prompt isn't up yet, the logos are) and are
      # included only to keep the parser exercising the multi-entry
      # path end-to-end.
      #
      # Previously, as soon as TASK_FILE_SELECT ran its first frame,
      # HandleFileScreenEnter called ClearTileMaps → MemClear of
      # gMapDataBottomSpecial/gMapDataTopSpecial (32 KiB each), which
      # overran the 256-byte stub buffers in
      # src/platform/shared/port_unresolved_stubs.c and clobbered
      # gEEPROMConfig, NULL-deref'ing the very next EEPROMRead in
      # ReadSaveFileStatus. That follow-up has now been addressed by
      # giving the two map-data stubs their proper 0x8000-byte size,
      # so this step now requires exit 0: any SEGV/abort/non-zero
      # status is treated as a regression.
      - name: Scripted-input smoke test (headless, START presses past the title)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          set -euo pipefail
          run_until_title_passed() {
              local label="$1"; shift
              "$@"
              echo "[$label] tmc_sdl exited cleanly"
          }

          # Inline `--press=` form. The two real progression presses are
          # START@350 and START@500 (see comment above for timing); the
          # earlier entries keep the multi-press / chord parser exercised.
          run_until_title_passed inline \
              ./build/tmc_sdl --frames=700 --mute --save-dir=. \
                  --press='START@60+5,START@350+5,A@380+5,START@500+5'

          # File-based `--input-script=` form, via a transient script.
          script=$(mktemp build/scripted-input.XXXXXX.txt)
          trap 'rm -f "$script"' EXIT
          cat > "$script" <<'EOF'
          # Comment lines and blank lines are ignored.
          # Title-screen progression: see workflow comment above for the
          # frame numbers chosen here.

          START@60+5
          START@350+5
          A@380+5
          START@500+5
          EOF
          run_until_title_passed file \
              ./build/tmc_sdl --frames=700 --mute --save-dir=. \
                  --input-script="$script"
