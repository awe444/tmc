name: SDL port build

on:
  push:
    branches: [main, master]
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'src/platform/**'
      - 'include/platform/**'
      - '.github/workflows/sdl.yml'
  pull_request:
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'src/platform/**'
      - 'include/platform/**'
      - '.github/workflows/sdl.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ubuntu-latest (${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [USA]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev ninja-build

      - name: Configure
        run: |
          cmake -S . -B build -DTMC_GAME_VERSION=${{ matrix.version }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Smoke test (headless, 30 frames)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          ./build/tmc_sdl --frames=30 --mute --save-dir=.

      # Sub-step 2b.2 of the SDL-port roadmap: verify that the subset of
      # `src/**/*.c` which already compiles under `__PORT__` keeps compiling.
      # The resulting tmc_game_sources static library is not linked into
      # tmc_sdl yet (sub-steps 2b.3/2b.4 handle that), but building it here
      # catches regressions in the leaf TUs on every PR.
      - name: Configure (TMC_LINK_GAME_SOURCES=ON)
        run: |
          cmake -S . -B build-game -DTMC_GAME_VERSION=${{ matrix.version }} -DCMAKE_BUILD_TYPE=Release -DTMC_LINK_GAME_SOURCES=ON

      - name: Build (TMC_LINK_GAME_SOURCES=ON)
        run: cmake --build build-game --config Release -j
