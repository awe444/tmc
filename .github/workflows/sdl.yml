name: SDL port build

on:
  push:
    branches: [main, master]
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'src/platform/**'
      - 'include/platform/**'
      - 'tools/port/**'
      - 'data/gfx/**'
      - 'assets/gfx.json'
      - '.github/workflows/sdl.yml'
  pull_request:
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'src/platform/**'
      - 'include/platform/**'
      - 'tools/port/**'
      - 'data/gfx/**'
      - 'assets/gfx.json'
      - '.github/workflows/sdl.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ubuntu-latest (${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [USA]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev ninja-build

      - name: Configure
        run: |
          cmake -S . -B build -DTMC_GAME_VERSION=${{ matrix.version }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      # Scripted-input smoke test: drive synthetic input through the
      # actual title-screen + file-select state machines so CI exercises
      # the full boot → "PRESS START" → file-select → New File → on-screen
      # keyboard → "type A" → END-confirm path on every run.
      #
      # Title-screen + file-select timing (USA build, observed via the
      # per-frame fileselect.* trace; see HandleTitlescreen in
      # src/title.c and HandleFileNew in src/fileselect.c):
      #   f≈321  HandleTitlescreen reaches gIntroState.state=1 sub=3
      #          (the "PRESS START" idle that polls for input)
      #   f=350  scripted START → AdvanceIntroSequence transitions
      #          gIntroState.state 1→2 with an internal timer=60 frames
      #   f≈411  the 60-frame countdown completes → state 2→3 (polling
      #          again for the second advance press)
      #   f=500  scripted START → AdvanceIntroSequence sets
      #          gMain.state=GAMETASK_MAIN and queues a fade-out
      #   f≈534  fade completes → SetTask(TASK_FILE_SELECT); file-select
      #          enters STATE_NONE on slot 0 (an empty save)
      #   f=720  scripted START on the empty slot → STATE_NEW; on entry
      #          HandleFileNew[0] = sub_08051090 runs and (under __PORT__)
      #          seeds the on-screen-keyboard glyph table into gBG3Buffer
      #   f=780  scripted A at the default keyboard cursor (0,0) →
      #          gSave.name[0] = 'A' (0x41)
      #   f=840  scripted START → cursor jumps to the END function key
      #          (11,5,3,1)
      #   f=900  scripted A on END (with name[0] != 0) → action=2 →
      #          SetMenuType(2) → save-creation flow entered
      #
      # The save-creation flow that runs after f=900 previously SIGSEGV'd
      # in `sub_0805EEB4` (src/text.c), which `sub_080513A8` reaches via
      # `CreateDialogBox(5, 0)` -> `ShowTextBox(8, ...)` -> `InitToken`
      # before any save bytes are written. The root cause was the weak
      # 256-byte BSS placeholder for `gTranslations[]` in
      # `port_unresolved_stubs.c`: every entry read as NULL, so the very
      # first `puVar2[(u8)(textIndex >> 8)]` lookup dereferenced NULL.
      # That is now fixed by a strong host stand-in for `gTranslations`
      # in `src/platform/shared/port_text_data_stubs.c` (mirroring the
      # existing `gUnk_08109248` override there); the smoke test should
      # now run cleanly through frame 1100. Keep `set -euo pipefail`
      # so any future regression on this path fails the step.
      #
      # The frame budget (1100) deliberately runs past f=900 so that any
      # regression in the save-creation flow is observed on this CI step
      # rather than being silently truncated by an earlier --frames cap.
      - name: Scripted-input smoke test (headless, drives "type A" on the file-name keyboard)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          set -euo pipefail
          run_until_title_passed() {
              local label="$1"; shift
              "$@"
              echo "[$label] tmc_sdl exited cleanly"
          }

          # Inline `--press=` form. Real progression presses, in order:
          #   START@350, START@500    -- past the title screen
          #   START@720               -- enter STATE_NEW on the empty slot
          #   A@780                   -- type 'A' at the default cursor
          #   START@840               -- jump cursor to END
          #   A@900                   -- confirm the name → save-creation
          # The earlier `START@60+5` and `A@380+5` entries are no-ops at
          # those frames (logos / fade) and are included only to keep
          # the multi-entry parser exercised end-to-end.
          run_until_title_passed inline \
              ./build/tmc_sdl --frames=1100 --mute --save-dir=. \
                  --press='START@60+5,START@350+5,A@380+5,START@500+5,START@720+5,A@780+5,START@840+5,A@900+5'

          # File-based `--input-script=` form, via a transient script.
          script=$(mktemp build/scripted-input.XXXXXX.txt)
          trap 'rm -f "$script"' EXIT
          cat > "$script" <<'EOF'
          # Comment lines and blank lines are ignored.
          # Title-screen + file-select progression: see workflow comment
          # above for the frame numbers chosen here.

          START@60+5
          START@350+5
          A@380+5
          START@500+5
          START@720+5
          A@780+5
          START@840+5
          A@900+5
          EOF
          run_until_title_passed file \
              ./build/tmc_sdl --frames=1100 --mute --save-dir=. \
                  --input-script="$script"
