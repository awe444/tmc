name: SDL port build

on:
  push:
    branches: [main, master]
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'src/platform/**'
      - 'include/platform/**'
      - 'tools/port/**'
      - 'data/gfx/**'
      - 'assets/gfx.json'
      - '.github/workflows/sdl.yml'
  pull_request:
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'src/platform/**'
      - 'include/platform/**'
      - 'tools/port/**'
      - 'data/gfx/**'
      - 'assets/gfx.json'
      - '.github/workflows/sdl.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ubuntu-latest (${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [USA]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev ninja-build

      - name: Configure
        run: |
          cmake -S . -B build -DTMC_GAME_VERSION=${{ matrix.version }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Smoke test (headless, 30 frames)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          ./build/tmc_sdl --frames=30 --mute --save-dir=.

      # Scripted-input smoke test: drive synthetic START presses through
      # the actual title-screen state machine so CI exercises the full
      # boot → "PRESS START" → file-select handoff path on every run.
      #
      # Title-screen timing (USA build, observed via the per-frame state
      # trace; see HandleTitlescreen in src/title.c):
      #   f≈321  HandleTitlescreen reaches gIntroState.state=1 sub=3
      #          (the "PRESS START" idle that polls for input)
      #   f=350  scripted START fires → AdvanceIntroSequence transitions
      #          gIntroState.state 1→2 with an internal timer=60 frames
      #   f≈411  the 60-frame countdown completes → state 2→3 (now
      #          polling again for the second advance press)
      #   f=500  scripted START fires → AdvanceIntroSequence sets
      #          gMain.state=GAMETASK_MAIN and queues a fade-out
      #   f≈534  fade completes → SetTask(TASK_FILE_SELECT)
      #
      # The frame budget below (700) deliberately runs past that final
      # task switch so CI verifies the START presses really do progress
      # past the title screen, not just that they reach
      # REG_KEYINPUT. The two earlier `--press=` entries (`START@60+5`
      # and the lone `A@180+5`) are no-ops at those frame numbers
      # (the press-start prompt isn't up yet, the logos are) and are
      # included only to keep the parser exercising the multi-entry
      # path end-to-end.
      #
      # Previously, as soon as TASK_FILE_SELECT ran its first frame,
      # HandleFileScreenEnter called ClearTileMaps → MemClear of
      # gMapDataBottomSpecial/gMapDataTopSpecial (32 KiB each), which
      # overran the 256-byte stub buffers in
      # src/platform/shared/port_unresolved_stubs.c and clobbered
      # gEEPROMConfig, NULL-deref'ing the very next EEPROMRead in
      # ReadSaveFileStatus. That follow-up has now been addressed by
      # giving the two map-data stubs their proper 0x8000-byte size,
      # so this step now requires exit 0: any SEGV/abort/non-zero
      # status is treated as a regression.
      - name: Scripted-input smoke test (headless, START presses past the title)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          set -euo pipefail
          run_until_title_passed() {
              local label="$1"; shift
              "$@"
              echo "[$label] tmc_sdl exited cleanly"
          }

          # Inline `--press=` form. The two real progression presses are
          # START@350 and START@500 (see comment above for timing); the
          # earlier entries keep the multi-press / chord parser exercised.
          run_until_title_passed inline \
              ./build/tmc_sdl --frames=700 --mute --save-dir=. \
                  --press='START@60+5,START@350+5,A@380+5,START@500+5'

          # File-based `--input-script=` form, via a transient script.
          script=$(mktemp build/scripted-input.XXXXXX.txt)
          trap 'rm -f "$script"' EXIT
          cat > "$script" <<'EOF'
          # Comment lines and blank lines are ignored.
          # Title-screen progression: see workflow comment above for the
          # frame numbers chosen here.

          START@60+5
          START@350+5
          A@380+5
          START@500+5
          EOF
          run_until_title_passed file \
              ./build/tmc_sdl --frames=700 --mute --save-dir=. \
                  --input-script="$script"

      # PR #8 of the SDL-port roadmap: golden-image strict-equality check.
      #
      # The default build is now `TMC_LINK_GAME_SOURCES=ON` (PR #2b.4b
      # runtime flip), so this check exercises the real
      # `src/main.c::AgbMain` reaching the title-screen idle. The
      # title-screen frame hash is pinned in
      # `src/platform/shared/golden/usa_on_frames30.txt` and has been
      # verified stable across `--frames={30, 60, 120, 240, 600, 1200}`,
      # so this catches both rasterizer regressions and boot-time
      # game-state divergences in the same check.
      #
      # The two-run determinism is preserved as a secondary assertion
      # so any host-side non-determinism still surfaces with a clear
      # error (the strict-equality match would also catch it, but the
      # determinism diagnostic is more specific).
      - name: Golden-image strict-equality check (default / ON build)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          set -euo pipefail
          mkdir -p build
          save_dir_run1=$(mktemp -d build/golden-tmp-run1.XXXXXX)
          save_dir_run2=$(mktemp -d build/golden-tmp-run2.XXXXXX)
          trap 'rm -rf "$save_dir_run1" "$save_dir_run2"' EXIT
          run1=$(./build/tmc_sdl --frames=30 --mute \
                     --save-dir="$save_dir_run1" --print-frame-hash 2>/dev/null \
                     | grep '^frame-hash:' || true)
          run2=$(./build/tmc_sdl --frames=30 --mute \
                     --save-dir="$save_dir_run2" --print-frame-hash 2>/dev/null \
                     | grep '^frame-hash:' || true)
          expected=$(grep '^frame-hash:' src/platform/shared/golden/usa_on_frames30.txt || true)
          echo "run1:     $run1"
          echo "run2:     $run2"
          echo "expected: $expected"
          if [ -z "$run1" ] || [ -z "$run2" ]; then
            echo "::error::tmc_sdl --print-frame-hash produced no output."
            exit 1
          fi
          if [ -z "$expected" ]; then
            echo "::error::Golden-image baseline src/platform/shared/golden/usa_on_frames30.txt is missing a frame-hash line."
            exit 1
          fi
          if [ "$run1" != "$run2" ]; then
            echo "::error::Default (ON) build's title-screen frame hash is not deterministic."
            echo "::error::Two consecutive --frames=30 runs disagreed."
            exit 1
          fi
          if [ "$run1" != "$expected" ]; then
            echo "::error::Golden-image hash mismatch for the default (ON) build at --frames=30."
            echo "::error::See src/platform/shared/golden/README.md for how to update if intentional."
            exit 1
          fi

      # The `=OFF` build (empty-loop `agb_main_stub.c`) is preserved
      # both as an early-bring-up scaffold for future ports (PSP / PS2
      # / ...) and as an isolation harness for the platform layer
      # itself. CI keeps it compile-checked + smoke-tested + golden-
      # checked on every run so that path doesn't bit-rot.
      - name: Configure (TMC_LINK_GAME_SOURCES=OFF)
        run: |
          cmake -S . -B build-link-off -DTMC_GAME_VERSION=${{ matrix.version }} -DTMC_LINK_GAME_SOURCES=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build (TMC_LINK_GAME_SOURCES=OFF)
        run: cmake --build build-link-off --config Release -j

      - name: Smoke test (OFF build, headless, 30 frames)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          ./build-link-off/tmc_sdl --frames=30 --mute --save-dir=.

      # PR #8 of the SDL-port roadmap: golden-image CI test.
      #
      # Asserts the rasterizer's framebuffer hash for the OFF build at
      # frame 30 matches the value pinned in
      # `src/platform/shared/golden/usa_off_frames30.txt`. The OFF build
      # exercises the empty-loop `agb_main_stub.c`, so the framebuffer
      # is exactly the rasterizer's empty-VRAM / empty-OAM / empty-PLTT
      # default — any rasterizer regression observable through that
      # surface fails CI here with a clear diff between the produced
      # and expected hash.
      - name: Golden-image hash check (OFF build)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          set -euo pipefail
          output=$(./build-link-off/tmc_sdl --frames=30 --mute --save-dir=. --print-frame-hash 2>&1)
          actual=$(printf '%s\n' "$output" | grep '^frame-hash:' || true)
          if [ -z "$actual" ]; then
            echo "::error::Golden-image hash check for the OFF build did not produce a frame-hash line at --frames=30."
            echo "::error::Command output follows:"
            printf '%s\n' "$output"
            exit 1
          fi
          expected=$(grep '^frame-hash:' src/platform/shared/golden/usa_off_frames30.txt || true)
          if [ -z "$expected" ]; then
            echo "::error::Golden-image baseline src/platform/shared/golden/usa_off_frames30.txt is missing a frame-hash line."
            exit 1
          fi
          echo "actual:   $actual"
          echo "expected: $expected"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Golden-image hash mismatch for the OFF build at --frames=30."
            echo "::error::See src/platform/shared/golden/README.md for how to update if intentional."
            exit 1
          fi

      # PR #2c of the SDL-port roadmap: opt-in extracted-asset
      # integration. Generate a deterministic 16,777,216-byte all-zero
      # placeholder baserom (so we exercise the asset pipeline without
      # shipping copyrighted ROM data), then build with
      # `-DTMC_BASEROM=...` and smoke-test the result.
      #
      # An all-zero baserom is intentionally chosen: the host
      # `Port_LZ77UnComp*` reads a 4-byte header and `out_size=0` exits
      # the decompressor immediately, while uncompressed `DmaSet` paths
      # just copy zeros into VRAM/EWRAM. The visible result is the same
      # blank backdrop the stub build produces, but the run still
      # exercises the real `gGfxGroups[]` / `gPaletteGroups[]` table
      # layout, the per-variant `.ifdef` resolution in
      # `data/gfx/{gfx,palette}_groups.s`, the `gfx_offsets.h` macro
      # generation, and the `Port_TranslateHwAddr()` translation hop
      # that makes `LoadGfxGroup`'s `dest=0x06000000`-style writes land
      # inside `gPortVram`. Any regression in any of those surfaces as
      # a build / link / runtime failure here.
      - name: Generate placeholder baserom
        run: |
          mkdir -p build-placeholders
          python3 tools/port/gen_host_assets.py make-placeholder-baserom \
              --out build-placeholders/placeholder_baserom.gba

      - name: Configure (TMC_BASEROM=<placeholder>)
        run: |
          cmake -S . -B build-baserom -DTMC_GAME_VERSION=${{ matrix.version }} \
              -DTMC_BASEROM=$(pwd)/build-placeholders/placeholder_baserom.gba \
              -DCMAKE_BUILD_TYPE=Release

      - name: Build (TMC_BASEROM=<placeholder>)
        run: cmake --build build-baserom --config Release -j

      - name: Smoke test (TMC_BASEROM build, headless, 30 frames)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          ./build-baserom/tmc_sdl --frames=30 --mute --save-dir=.

      # The placeholder-baserom build copies all-zero asset bytes into
      # the (already-zero) emulated VRAM/PLTT, so the resulting
      # framebuffer matches the default ON build's golden hash exactly.
      # Asserting the equality here means the asset-integration plumbing
      # is observably side-effect-free with an all-zero blob -- the
      # exact property the placeholder baserom was designed to exhibit.
      - name: Golden-image hash check (TMC_BASEROM build)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          set -euo pipefail
          actual=$(./build-baserom/tmc_sdl --frames=30 --mute --save-dir=. \
                       --print-frame-hash 2>/dev/null \
                       | grep '^frame-hash:' || true)
          expected=$(grep '^frame-hash:' src/platform/shared/golden/usa_on_frames30.txt || true)
          echo "actual:   $actual"
          echo "expected: $expected"
          if [ -z "$actual" ] || [ -z "$expected" ]; then
            echo "::error::TMC_BASEROM build did not produce a frame-hash line at --frames=30."
            exit 1
          fi
          if [ "$actual" != "$expected" ]; then
            echo "::error::TMC_BASEROM placeholder build's frame hash diverged from the default ON build's golden hash."
            echo "::error::An all-zero placeholder baserom should produce a blank framebuffer identical to the stub build."
            exit 1
          fi
